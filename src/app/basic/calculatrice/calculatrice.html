<div >

    <h2>Calculatrice Angular</h2>

    <label> a : </label> <input type="number" [(ngModel)] = "a"> <br>
    <label> b : </label> <input type="number" [(ngModel)] = "b"> <br>
    <label> operation: </label> <br>
        <input type="button" value="add" (click)="onCalculer('+')"> &nbsp;
        <input type="button" value="min" (click)="onCalculer('-')"> &nbsp;
        <input type="button" value="mult" (click)="onCalculer('*')"> <br>
    
       
        <label>Résultat</label> &nbsp;
        <span [style.font-weight]="res>0?'bold':'normal'">{{res}}</span> 
        <br>

        <input type="checkbox" [(ngModel)]="montrerHistorique"> Voir l'historique des calculs
         <br>

        @if(montrerHistorique){
            <ul>
                @for (h of historiqueCalculs; track h){
                    <li>{{h}}</li>
                }
            </ul>
        }


    <div class="c2" (mousemove)="onMouseMove($event)"
                    (mouseleave)="onMouseLeave($event)">

        Zone à survoler à la souris. <br>
        x={{x}}, y={{y}}
    </div>

</div>
